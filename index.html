<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ChemoGuide — ข้อมูลยาเคมีบำบัดและลำดับการให้ยา</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F5F8FC;
    --surface:#FFFFFF;
    --ink:#16233F;
    --muted:#5E6E89;
    --line:#DEE6F0;
    --blue:#2454D6;
    --blue-dark:#173B9E;
    --blue-soft:#E8EEFC;
    --hazard:#C53A2B;
    --hazard-soft:#FBEAE7;
    --radius:12px;
    --shadow: 0 1px 2px rgba(22,35,63,0.04), 0 6px 20px rgba(22,35,63,0.06);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',system-ui,-apple-system,sans-serif;
    font-size:15px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3,h4{
    font-family:'Space Grotesk',sans-serif;
    margin:0;
    letter-spacing:-0.01em;
  }
  .mono{font-family:'IBM Plex Mono',monospace;}
  button{font-family:inherit;cursor:pointer;}
  :focus-visible{outline:2px solid var(--blue); outline-offset:2px; border-radius:6px;}

  /* ===== Topbar ===== */
  .topbar{
    position:sticky; top:0; z-index:30;
    background:var(--surface);
    border-bottom:1px solid var(--line);
  }
  .topbar-inner{
    max-width:1140px; margin:0 auto;
    display:flex; align-items:center; gap:14px;
    padding:16px 24px;
  }
  .logo-mark{
    width:34px; height:34px; border-radius:9px;
    background:linear-gradient(155deg, var(--blue), var(--blue-dark));
    display:flex; align-items:center; justify-content:center;
    flex-shrink:0;
  }
  .logo-mark svg{width:18px;height:18px;}
  .brand-text h1{font-size:18px; color:var(--ink); font-weight:700;}
  .brand-text p{margin:1px 0 0; font-size:12.5px; color:var(--muted);}
  .sample-badge{
    margin-left:auto;
    display:flex; align-items:center; gap:6px;
    background:var(--hazard-soft); color:var(--hazard);
    border:1px solid rgba(197,58,43,0.25);
    font-size:12px; font-weight:600;
    padding:6px 12px; border-radius:999px;
    white-space:nowrap;
  }
  .sample-badge svg{width:13px;height:13px; flex-shrink:0;}

  /* ===== Tabs ===== */
  .tabs{
    max-width:1140px; margin:0 auto;
    padding:0 24px;
    display:flex; gap:4px;
    border-bottom:1px solid var(--line);
  }
  .tab-btn{
    border:none; background:none;
    padding:14px 4px; margin-right:22px;
    font-size:14.5px; font-weight:600; color:var(--muted);
    border-bottom:2px solid transparent;
    transition:color .15s ease, border-color .15s ease;
  }
  .tab-btn:hover{color:var(--ink);}
  .tab-btn[aria-selected="true"]{color:var(--blue); border-bottom-color:var(--blue);}

  /* ===== Layout ===== */
  .page{max-width:1140px; margin:0 auto; padding:24px;}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}

  /* ===== Toolbar (search + filters) ===== */
  .toolbar{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:16px 18px;
    margin-bottom:20px;
  }
  .search-row{display:flex; gap:10px; align-items:center;}
  .search-box{
    flex:1; display:flex; align-items:center; gap:9px;
    background:var(--bg); border:1px solid var(--line);
    border-radius:9px; padding:9px 12px;
  }
  .search-box svg{width:16px; height:16px; color:var(--muted); flex-shrink:0;}
  .search-box input{
    border:none; background:none; outline:none;
    width:100%; font-size:14.5px; color:var(--ink); font-family:inherit;
  }
  .clear-filters{
    border:1px solid var(--line); background:var(--surface);
    color:var(--muted); font-size:13px; font-weight:600;
    padding:9px 14px; border-radius:9px; white-space:nowrap;
    transition:border-color .15s ease, color .15s ease;
  }
  .clear-filters:hover{border-color:var(--blue); color:var(--blue);}

  .filter-groups{margin-top:14px; display:flex; flex-direction:column; gap:10px;}
  .filter-group{display:flex; gap:8px; align-items:flex-start; flex-wrap:wrap;}
  .filter-group-label{
    font-size:12px; font-weight:600; color:var(--muted);
    padding:7px 0; min-width:108px; flex-shrink:0;
  }
  .chip-row{display:flex; gap:7px; flex-wrap:wrap;}
  .chip{
    display:flex; align-items:center; gap:6px;
    border:1px solid var(--line); background:var(--bg);
    color:var(--ink); font-size:12.5px; font-weight:500;
    padding:6.5px 12px 6.5px 9px; border-radius:999px;
    transition:all .12s ease;
  }
  .chip svg{width:13px; height:13px; flex-shrink:0;}
  .chip:hover{border-color:var(--blue);}
  .chip[aria-pressed="true"]{
    background:var(--blue); border-color:var(--blue); color:#fff;
  }
  .chip.hazard[aria-pressed="true"]{background:var(--hazard); border-color:var(--hazard);}

  .results-count{font-size:13px; color:var(--muted); margin:0 2px 14px;}

  /* ===== Drug Grid ===== */
  .drug-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(280px,1fr));
    gap:14px;
  }
  .drug-card{
    background:var(--surface); border:1px solid var(--line);
    border-radius:var(--radius); padding:16px;
    cursor:pointer; text-align:left;
    transition:box-shadow .15s ease, border-color .15s ease, transform .1s ease;
    display:flex; flex-direction:column; gap:10px;
  }
  .drug-card:hover{box-shadow:var(--shadow); border-color:#C9D7F2; transform:translateY(-1px);}
  .drug-card-head{display:flex; justify-content:space-between; gap:8px;}
  .drug-card-name h3{font-size:16px; font-weight:600;}
  .drug-card-name .alt-name{font-size:12.5px; color:var(--muted); margin-top:2px;}
  .drug-class{
    font-size:11px; font-weight:600; color:var(--blue);
    background:var(--blue-soft); padding:3px 9px; border-radius:999px;
    white-space:nowrap; align-self:flex-start;
  }
  .drug-card-tags{display:flex; gap:6px; flex-wrap:wrap;}
  .tag-pill{
    display:inline-flex; align-items:center; gap:5px;
    font-size:11.5px; font-weight:600;
    padding:4px 9px; border-radius:999px;
  }
  .tag-pill svg{width:11px; height:11px; flex-shrink:0;}
  .tag-pill.hazard{background:var(--hazard-soft); color:var(--hazard);}
  .tag-pill.handling{background:var(--blue-soft); color:var(--blue-dark);}
  .drug-card-note{font-size:12.5px; color:var(--muted); margin:0;}
  .empty-state{
    text-align:center; padding:60px 20px; color:var(--muted);
    border:1px dashed var(--line); border-radius:var(--radius);
  }
  .empty-state svg{width:30px;height:30px;margin-bottom:10px;color:#AEBFDA;}

  /* ===== Detail Panel ===== */
  .backdrop{
    position:fixed; inset:0; background:rgba(16,24,45,0.35);
    opacity:0; visibility:hidden; transition:opacity .18s ease;
    z-index:40;
  }
  .backdrop.show{opacity:1; visibility:visible;}
  .detail-panel{
    position:fixed; top:0; right:0; height:100%;
    width:420px; max-width:92vw;
    background:var(--surface);
    box-shadow:-8px 0 30px rgba(16,24,45,0.18);
    transform:translateX(100%); transition:transform .2s ease;
    z-index:41; overflow-y:auto;
  }
  .detail-panel.show{transform:translateX(0);}
  .detail-head{
    padding:22px 22px 16px; border-bottom:1px solid var(--line);
    position:sticky; top:0; background:var(--surface);
  }
  .detail-close{
    float:right; border:none; background:var(--bg);
    width:30px; height:30px; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    color:var(--muted);
  }
  .detail-close:hover{color:var(--ink); background:var(--line);}
  .detail-head h2{font-size:20px; margin-bottom:3px;}
  .detail-head .alt-name{font-size:13px; color:var(--muted);}
  .detail-body{padding:18px 22px 30px; display:flex; flex-direction:column; gap:20px;}
  .detail-section h4{
    font-size:11.5px; text-transform:uppercase; letter-spacing:.04em;
    color:var(--muted); margin-bottom:8px; font-weight:600;
  }
  .detail-section p{margin:0; font-size:14px; color:var(--ink);}
  .detail-tags{display:flex; flex-direction:column; gap:8px;}
  .detail-tag-row{
    display:flex; gap:10px; align-items:flex-start;
    padding:10px 12px; border-radius:9px;
  }
  .detail-tag-row.hazard{background:var(--hazard-soft);}
  .detail-tag-row.handling{background:var(--blue-soft);}
  .detail-tag-row svg{width:15px; height:15px; flex-shrink:0; margin-top:1px;}
  .detail-tag-row.hazard svg{color:var(--hazard);}
  .detail-tag-row.handling svg{color:var(--blue-dark);}
  .detail-tag-row strong{display:block; font-size:13px; margin-bottom:2px;}
  .detail-tag-row span{font-size:12.5px; color:var(--muted);}

  /* ===== Sequencing tab ===== */
  .regimen-select-row{display:flex; gap:8px; flex-wrap:wrap; margin-bottom:18px;}
  .regimen-pill{
    border:1px solid var(--line); background:var(--surface);
    padding:9px 16px; border-radius:999px; font-size:13.5px; font-weight:600; color:var(--ink);
  }
  .regimen-pill[aria-pressed="true"]{background:var(--blue); border-color:var(--blue); color:#fff;}

  .regimen-card{
    background:var(--surface); border:1px solid var(--line);
    border-radius:var(--radius); padding:22px 24px 26px; margin-bottom:18px;
  }
  .regimen-header{
    display:flex; justify-content:space-between; align-items:flex-start;
    gap:14px; margin-bottom:6px; flex-wrap:wrap;
  }
  .regimen-header h3{font-size:18px;}
  .regimen-indication{font-size:13px; color:var(--muted); margin-top:3px;}
  .regimen-meta{
    font-size:12px; font-weight:600; color:var(--blue);
    background:var(--blue-soft); padding:5px 11px; border-radius:999px; white-space:nowrap;
  }
  .regimen-note{
    font-size:12.5px; color:var(--muted); background:var(--bg);
    border:1px solid var(--line); border-radius:8px; padding:9px 12px; margin:14px 0 6px;
  }

  .timeline{position:relative; margin-top:18px; padding-left:6px;}
  .timeline::before{
    content:""; position:absolute; left:17px; top:6px; bottom:6px; width:2px;
    background:linear-gradient(to bottom, var(--blue), var(--blue-soft));
    border-radius:2px;
  }
  .step{position:relative; display:flex; gap:16px; padding:0 0 26px 0;}
  .step:last-child{padding-bottom:0;}
  .step-marker{
    flex-shrink:0; width:36px; height:36px; border-radius:50%;
    background:var(--surface); border:2px solid var(--blue);
    color:var(--blue); font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:13px;
    display:flex; align-items:center; justify-content:center;
    position:relative; z-index:2;
  }
  .step-marker.drip::after{
    content:""; position:absolute; width:6px; height:6px; border-radius:50%;
    background:var(--blue); top:42px; left:50%; transform:translateX(-50%);
    animation:drip 2.6s ease-in-out infinite;
  }
  @keyframes drip{
    0%{opacity:0; transform:translate(-50%,0);}
    30%{opacity:1;}
    80%{opacity:0; transform:translate(-50%,14px);}
    100%{opacity:0;}
  }
  @media (prefers-reduced-motion: reduce){
    .step-marker.drip::after{animation:none; opacity:0;}
  }
  .step-content{flex:1; padding-top:4px;}
  .step-top{display:flex; gap:10px; align-items:baseline; flex-wrap:wrap; margin-bottom:4px;}
  .step-top h4{font-size:15px; font-weight:600; color:var(--ink); font-family:'Inter',sans-serif;}
  .step-form{font-size:12.5px; color:var(--muted); font-family:'IBM Plex Mono',monospace;}
  .step-tags{display:flex; gap:6px; flex-wrap:wrap; margin:6px 0;}
  .step-rationale{font-size:13px; color:var(--muted); margin-top:4px;}

  footer{
    max-width:1140px; margin:0 auto; padding:10px 24px 50px;
    color:var(--muted); font-size:12px; text-align:center;
  }

  @media (max-width:700px){
    .topbar-inner{padding:14px 16px;}
    .sample-badge span{display:none;}
    .page{padding:16px;}
    .filter-group{flex-direction:column;}
    .filter-group-label{min-width:auto;}
    .detail-panel{width:100%;}
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 2h6M10 2v6.5L4.5 18a2 2 0 0 0 1.7 3h11.6a2 2 0 0 0 1.7-3L14 8.5V2"/><path d="M7.5 14.5h9"/></svg>
    </div>
    <div class="brand-text">
      <h1>ChemoGuide</h1>
      <p>ข้อมูลยาเคมีบำบัด และลำดับการให้ยาตามสูตร</p>
    </div>
    <div class="sample-badge" title="ข้อมูลในหน้านี้เป็นตัวอย่างเพื่อการออกแบบ ยังไม่ผ่านการตรวจสอบทางคลินิก">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01M10.3 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.7 3.86a2 2 0 0 0-3.4 0Z"/></svg>
      <span>ข้อมูลตัวอย่าง — ยังไม่ผ่านการตรวจสอบ</span>
    </div>
  </div>
  <nav class="tabs" role="tablist">
    <button class="tab-btn" role="tab" aria-selected="true" data-tab="drugs">ข้อมูลยา Chemo</button>
    <button class="tab-btn" role="tab" aria-selected="false" data-tab="sequencing">Sequencing การให้ยา</button>
  </nav>
</header>

<main class="page">

  <!-- ===================== TAB 1: DRUG INFO ===================== -->
  <section class="tab-panel active" id="tab-drugs">
    <div class="toolbar">
      <div class="search-row">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
          <input id="drug-search" type="text" placeholder="ค้นหาชื่อยา เช่น Doxorubicin, Paclitaxel...">
        </div>
        <button class="clear-filters" id="clear-filters-btn">ล้างตัวกรอง</button>
      </div>
      <div class="filter-groups" id="filter-groups"></div>
    </div>

    <p class="results-count" id="results-count"></p>
    <div class="drug-grid" id="drug-grid"></div>
  </section>

  <!-- ===================== TAB 2: SEQUENCING ===================== -->
  <section class="tab-panel" id="tab-sequencing">
    <div class="regimen-select-row" id="regimen-select-row"></div>
    <div id="regimen-list"></div>
  </section>

</main>

<footer>
  ใช้สำหรับเป็นแนวทางอ้างอิงเบื้องต้นเท่านั้น โปรดตรวจสอบกับแนวปฏิบัติของสถาบันและเอกสารกำกับยาก่อนใช้ทางคลินิกทุกครั้ง
</footer>

<div class="backdrop" id="backdrop"></div>
<aside class="detail-panel" id="detail-panel">
  <div class="detail-head">
    <button class="detail-close" id="detail-close" aria-label="ปิด">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
    </button>
    <h2 id="detail-name"></h2>
    <p class="alt-name" id="detail-alt"></p>
  </div>
  <div class="detail-body" id="detail-body"></div>
</aside>

<script>
/* =====================================================================
   ICONS — small inline SVG line icons reused across tag badges
   ===================================================================== */
const ICONS = {
  alert: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 9v4M12 17h.01M10.3 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.7 3.86a2 2 0 0 0-3.4 0Z"/></svg>',
  ban:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="m5.5 5.5 13 13"/></svg>',
  moon:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.5 14.5A8.5 8.5 0 1 1 9.5 3.5a7 7 0 0 0 11 11Z"/></svg>',
  filter:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16l-6 8v6l-4 2v-8L4 4Z"/></svg>',
  clock: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>',
  snow:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v20M4.5 6.5l15 11M19.5 6.5l-15 11"/></svg>',
  syringe:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 2 4 4M15 5l4 4M9 11l4 4M3 21l4-1.5L20.5 6.5a1.5 1.5 0 0 0-3-3L4.5 16 3 21Z"/></svg>',
};
function iconHtml(name){ return ICONS[name] || ICONS.alert; }

/* =====================================================================
   TAG TAXONOMY
   group: "hazard"  -> safety-critical, shown in warm/red
          "handling" -> preparation / administration instruction, shown in blue
   เพิ่มแท็กใหม่ได้โดยเพิ่ม object ในนี้ แล้วอ้างอิง id ในรายการยา/สูตรยา
   ===================================================================== */
const TAGS = {
  vesicant:    { label:"Vesicant", group:"hazard",   icon:"alert",  desc:"หากรั่วออกนอกหลอดเลือด (extravasation) ทำให้เนื้อเยื่อบาดเจ็บรุนแรงหรือเนื้อตายได้ ต้องให้ผ่านสายที่ free-flowing และเฝ้าระวังตลอดการให้ยา" },
  irritant:    { label:"Irritant", group:"hazard",   icon:"alert",  desc:"ระคายเคืองหลอดเลือด/เนื้อเยื่อหากรั่วออกนอกหลอดเลือด ควรเฝ้าระวังตำแหน่งสาย IV" },
  itFatal:     { label:"ห้ามให้ Intrathecal", group:"hazard", icon:"ban", desc:"เสียชีวิตได้หากบริหารยาเข้าช่องไขสันหลังโดยผิดพลาด ต้องติดป้ายเตือนและตรวจสอบเส้นทางให้ยาทุกครั้งก่อนบริหาร" },
  noNSS:       { label:"ห้ามผสมกับ NSS", group:"hazard", icon:"ban", desc:"เกิดการตกตะกอน/ไม่เสถียรเมื่อผสมกับสารละลายที่มีคลอไรด์ ให้เจือจางด้วย D5W เท่านั้น" },
  lightProtect:{ label:"ป้องกันแสง", group:"handling", icon:"moon", desc:"เก็บและบริหารยาในซองกันแสง (light-protective bag) ตลอดระยะเวลาการให้ยา" },
  filter022:   { label:"ใช้ inline filter 0.22 µm", group:"handling", icon:"filter", desc:"ต้องให้ยาผ่าน inline filter ขนาดรูพรุนไม่เกิน 0.22 ไมครอนระหว่างการบริหาร" },
  nonPVC:      { label:"ใช้ Non-PVC set", group:"handling", icon:"filter", desc:"ใช้ถุงและสายให้สารน้ำที่ไม่มี PVC/DEHP เพื่อลดการดูดซึมยาเข้ากับพลาสติก" },
  noShake:     { label:"ห้ามเขย่า", group:"handling", icon:"ban", desc:"ผสมโดยคว่ำขวดสลับเบา ๆ ห้ามเขย่าแรง เพราะจะเกิดฟองหรือทำให้โครงสร้างยาเสียสภาพ" },

/* =====================================================================
   RENDER HELPERS
   ===================================================================== */
function tagPillHtml(tagId, withLabel=true){
  const t = TAGS[tagId];
  if(!t) return "";
  return `<span class="tag-pill ${t.group}">${iconHtml(t.icon)}${withLabel ? `<span>${t.label}</span>` : ""}</span>`;
}

let activeFilters = new Set();
let searchQuery = "";

function buildFilterUI(){
  const groups = { hazard: [], handling: [] };
  Object.entries(TAGS).forEach(([id, t]) => groups[t.group].push(id));
  const groupLabels = { hazard:"ข้อควรระวัง", handling:"การเตรียม/ให้ยา" };

  const container = document.getElementById("filter-groups");
  container.innerHTML = Object.entries(groups).map(([group, ids]) => `
    <div class="filter-group">
      <span class="filter-group-label">${groupLabels[group]}</span>
      <div class="chip-row">
        ${ids.map(id => `
          <button class="chip ${group}" data-tag="${id}" aria-pressed="false" type="button">
            ${iconHtml(TAGS[id].icon)}<span>${TAGS[id].label}</span>
          </button>
        `).join("")}
      </div>
    </div>
  `).join("");

  container.querySelectorAll(".chip").forEach(chip => {
    chip.addEventListener("click", () => {
      const tag = chip.dataset.tag;
      const pressed = chip.getAttribute("aria-pressed") === "true";
      chip.setAttribute("aria-pressed", String(!pressed));
      if(pressed) activeFilters.delete(tag); else activeFilters.add(tag);
      renderDrugs();
    });
  });
}

function renderDrugs(){
  const grid = document.getElementById("drug-grid");
  const q = searchQuery.trim().toLowerCase();

  const filtered = DRUGS.filter(d => {
    const matchesSearch = !q || d.name.toLowerCase().includes(q) || (d.altName && d.altName.toLowerCase().includes(q)) || d.drugClass.toLowerCase().includes(q);
    const matchesTags = activeFilters.size === 0 || [...activeFilters].every(t => d.tags.includes(t));
    return matchesSearch && matchesTags;
  });

  document.getElementById("results-count").textContent = `พบ ${filtered.length} รายการ จากทั้งหมด ${DRUGS.length} รายการ`;

  if(filtered.length === 0){
    grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <div>ไม่พบยาที่ตรงกับการค้นหาหรือตัวกรองที่เลือก</div>
    </div>`;
    return;
  }

  grid.innerHTML = filtered.map(d => `
    <button class="drug-card" data-id="${d.id}" type="button">
      <div class="drug-card-head">
        <div class="drug-card-name">
          <h3>${d.name}</h3>
          ${d.altName ? `<div class="alt-name">${d.altName}</div>` : ""}
        </div>
        <span class="drug-class">${d.drugClass}</span>
      </div>
      <div class="drug-card-tags">${d.tags.map(t => tagPillHtml(t)).join("")}</div>
      <p class="drug-card-note">${d.note}</p>
    </button>
  `).join("");

  grid.querySelectorAll(".drug-card").forEach(card => {
    card.addEventListener("click", () => openDetail(card.dataset.id));
  });
}

function openDetail(id){
  const d = DRUGS.find(x => x.id === id);
  if(!d) return;
  document.getElementById("detail-name").textContent = d.name;
  document.getElementById("detail-alt").textContent = [d.altName, d.drugClass].filter(Boolean).join(" · ");
  document.getElementById("detail-body").innerHTML = `
    <div class="detail-section">
      <h4>คำเตือน / วิธีจัดเตรียมและให้ยา</h4>
      <div class="detail-tags">
        ${d.tags.map(t => `
          <div class="detail-tag-row ${TAGS[t].group}">
            ${iconHtml(TAGS[t].icon)}
            <div><strong>${TAGS[t].label}</strong><span>${TAGS[t].desc}</span></div>
          </div>
        `).join("")}
      </div>
    </div>
    <div class="detail-section">
      <h4>หมายเหตุการให้ยา</h4>
      <p>${d.note}</p>
    </div>
    <div class="detail-section">
      <h4>ข้อมูลเพิ่มเติม</h4>
      <p>${d.detail}</p>
    </div>
  `;
  document.getElementById("backdrop").classList.add("show");
  document.getElementById("detail-panel").classList.add("show");
}

function closeDetail(){
  document.getElementById("backdrop").classList.remove("show");
  document.getElementById("detail-panel").classList.remove("show");
}

function renderRegimenSelector(){
  const row = document.getElementById("regimen-select-row");
  row.innerHTML = REGIMENS.map((r,i) => `
    <button class="regimen-pill" data-id="${r.id}" aria-pressed="${i===0}" type="button">${r.name}</button>
  `).join("");
  row.querySelectorAll(".regimen-pill").forEach(btn => {
    btn.addEventListener("click", () => {
      row.querySelectorAll(".regimen-pill").forEach(b => b.setAttribute("aria-pressed","false"));
      btn.setAttribute("aria-pressed","true");
      renderRegimen(btn.dataset.id);
    });
  });
}

function renderRegimen(id){
  const r = REGIMENS.find(x => x.id === id);
  const list = document.getElementById("regimen-list");
  if(!r){ list.innerHTML = ""; return; }

  list.innerHTML = `
    <div class="regimen-card">
      <div class="regimen-header">
        <div>
          <h3>${r.name}</h3>
          <div class="regimen-indication">${r.indication}</div>
        </div>
        <span class="regimen-meta">รอบให้ยา ${r.cycle}</span>
      </div>
      ${r.note ? `<div class="regimen-note">${r.note}</div>` : ""}
      <div class="timeline">
        ${r.steps.map((s,i) => `
          <div class="step">
            <div class="step-marker ${i < r.steps.length-1 ? "drip" : ""}">${i+1}</div>
            <div class="step-content">
              <div class="step-top">
                <h4>${s.drug}</h4>
                <span class="step-form">${s.form}</span>
              </div>
              <div class="step-tags">${s.tags.map(t => tagPillHtml(t)).join("")}</div>
              ${s.rationale ? `<p class="step-rationale">${s.rationale}</p>` : ""}
            </div>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

/* =====================================================================
   INIT
   ===================================================================== */
document.querySelectorAll(".tab-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.setAttribute("aria-selected","false"));
    btn.setAttribute("aria-selected","true");
    document.querySelectorAll(".tab-panel").forEach(p => p.classList.remove("active"));
    document.getElementById(`tab-${btn.dataset.tab}`).classList.add("active");
  });
});

document.getElementById("drug-search").addEventListener("input", e => {
  searchQuery = e.target.value;
  renderDrugs();
});

document.getElementById("clear-filters-btn").addEventListener("click", () => {
  activeFilters.clear();
  document.querySelectorAll(".chip").forEach(c => c.setAttribute("aria-pressed","false"));
  document.getElementById("drug-search").value = "";
  searchQuery = "";
  renderDrugs();
});

document.getElementById("detail-close").addEventListener("click", closeDetail);
document.getElementById("backdrop").addEventListener("click", closeDetail);
document.addEventListener("keydown", e => { if(e.key === "Escape") closeDetail(); });

buildFilterUI();
renderDrugs();
renderRegimenSelector();
renderRegimen(REGIMENS[0].id);
</script>
